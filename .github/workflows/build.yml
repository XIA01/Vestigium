name: Build APK with Buildozer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "cython>=3.0" "buildozer>=1.5" "requests"
        sudo apt-get install -y libtool autoconf automake pkg-config libltdl-dev

    - name: Install Android SDK and NDK
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-11-jdk-headless android-sdk

    - name: Set up Android SDK
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        # Download SDK tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -q
        unzip -q commandlinetools-linux-10406996_latest.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ || true
        echo "export ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_ENV

    - name: Accept SDK licenses
      run: |
        mkdir -p $ANDROID_SDK_ROOT/licenses
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
        echo -e "\nd56f5187479451eabf01fb78af6dfcb131b33910" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
        echo -e "\n504667f4c0de7973335447fc6c3b7e6b1b1ac3e" > $ANDROID_SDK_ROOT/licenses/google-android-sdk-license

    - name: Install SDK packages
      run: |
        sdkmanager --install "build-tools;33.0.0" "platforms;android-33" "ndk;25.2.9519653" || true

    - name: Build with buildozer
      run: |
        cd $GITHUB_WORKSPACE/android-app
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: vestigium-wifi-apk
        path: android-app/bin/*.apk
